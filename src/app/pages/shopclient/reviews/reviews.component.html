<mat-card class="cardWithShadow">
    <mat-card-content>

        <!-- ── Filter bar ── -->
        <div class="row align-items-center m-b-4 g-2">

            <!-- Search -->
            <div class="col-lg-5 col-md-5">
                <mat-form-field appearance="outline" class="w-100 hide-hint">
                    <mat-label>Search Reviews</mat-label>
                    <input matInput [value]="searchQuery" (input)="onSearchInput($any($event.target).value)"
                        placeholder="Customer name or comment...">
                    <mat-icon matSuffix>search</mat-icon>
                </mat-form-field>
            </div>

            <!-- Status filter -->
            <div class="col-lg-3 col-md-4">
                <mat-form-field appearance="outline" class="w-100 hide-hint">
                    <mat-label>Status</mat-label>
                    <mat-select [(ngModel)]="selectedStatus" (selectionChange)="onFilterChange()">
                        <mat-option *ngFor="let s of statusOptions" [value]="s.value">{{ s.label }}</mat-option>
                    </mat-select>
                </mat-form-field>
            </div>

            <div class="col d-flex justify-content-end align-items-center gap-2">
                <mat-spinner *ngIf="isLoading" diameter="22"></mat-spinner>
            </div>
        </div>

        <!-- ── Table ── -->
        <div class="table-responsive">
            <table mat-table [dataSource]="dataSource" matSort class="w-100">

                <!-- Customer Name Column -->
                <ng-container matColumnDef="customer_name">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header class="f-w-600 mat-subtitle-1 f-s-14">Customer
                    </th>
                    <td mat-cell *matCellDef="let element" class="mat-body-1">
                        <div class="d-flex align-items-center">
                            <div class="m-l-16">
                                <h6 class="mat-subtitle-1 f-s-14 f-w-600 m-0">
                                    {{element.customer_name}}
                                </h6>
                            </div>
                        </div>
                    </td>
                </ng-container>

                <!-- Rating Column -->
                <ng-container matColumnDef="rating">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header class="f-w-600 mat-subtitle-1 f-s-14">Rating
                    </th>
                    <td mat-cell *matCellDef="let element" class="mat-body-1">
                        <div class="d-flex align-items-center text-warning f-s-14">
                            <mat-icon class="icon-18 m-r-4">star</mat-icon>
                            <span class="f-w-600 text-dark">{{element.rating}} / 5</span>
                        </div>
                    </td>
                </ng-container>

                <!-- Comment Column -->
                <ng-container matColumnDef="comment">
                    <th mat-header-cell *matHeaderCellDef class="f-w-600 mat-subtitle-1 f-s-14">Comment</th>
                    <td mat-cell *matCellDef="let element" class="mat-body-1">
                        <span class="text-truncate d-inline-block" style="max-width: 250px;" [title]="element.comment">
                            {{element.comment || '—'}}
                        </span>
                    </td>
                </ng-container>

                <!-- Status Column -->
                <ng-container matColumnDef="status">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header class="f-w-600 mat-subtitle-1 f-s-14">Status
                    </th>
                    <td mat-cell *matCellDef="let element" class="mat-body-1">
                        <span class="badge" [ngClass]="{
                            'bg-light-warning text-warning': element.status === 'PENDING',
                            'bg-light-success text-success': element.status === 'APPROVED',
                            'bg-light-error text-error': element.status === 'REJECTED',
                            'bg-light-primary text-primary': element.status === 'SPAM'
                        }">
                            {{element.status}}
                        </span>
                    </td>
                </ng-container>

                <!-- Created At Column -->
                <ng-container matColumnDef="created_at">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header class="f-w-600 mat-subtitle-1 f-s-14">Date
                    </th>
                    <td mat-cell *matCellDef="let element" class="mat-body-1">
                        {{element.created_at | date:'mediumDate'}}
                    </td>
                </ng-container>

                <!-- Actions Column -->
                <ng-container matColumnDef="actions">
                    <th mat-header-cell *matHeaderCellDef class="f-w-600 mat-subtitle-1 f-s-14 text-center">Actions</th>
                    <td mat-cell *matCellDef="let element" class="mat-body-1 text-center">
                        <button mat-icon-button [matMenuTriggerFor]="menu" aria-label="Review Actions">
                            <mat-icon>more_vert</mat-icon>
                        </button>
                        <mat-menu #menu="matMenu">
                            <button mat-menu-item (click)="updateStatus(element._id, 'APPROVED')"
                                *ngIf="element.status !== 'APPROVED'">
                                <mat-icon color="primary">check_circle</mat-icon>
                                <span>Approve</span>
                            </button>
                            <button mat-menu-item (click)="updateStatus(element._id, 'REJECTED')"
                                *ngIf="element.status !== 'REJECTED'">
                                <mat-icon color="warn">cancel</mat-icon>
                                <span>Reject</span>
                            </button>
                            <button mat-menu-item (click)="updateStatus(element._id, 'SPAM')"
                                *ngIf="element.status !== 'SPAM'">
                                <mat-icon>report</mat-icon>
                                <span>Mark as Spam</span>
                            </button>
                            <mat-divider></mat-divider>
                            <button mat-menu-item (click)="deleteReview(element)">
                                <mat-icon color="warn">delete_outline</mat-icon>
                                <span>Delete Forever</span>
                            </button>
                        </mat-menu>
                    </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

                <!-- Empty state -->
                <tr class="mat-row" *matNoDataRow>
                    <td class="mat-cell text-center p-y-24 text-muted" [attr.colspan]="displayedColumns.length">
                        <mat-icon class="d-block m-auto m-b-8" style="font-size:36px;height:36px;width:36px;">
                            reviews
                        </mat-icon>
                        No reviews found for this shop.
                    </td>
                </tr>
            </table>

            <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons aria-label="Select page of reviews">
            </mat-paginator>
        </div>
    </mat-card-content>
</mat-card>
