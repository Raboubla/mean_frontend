<h2 mat-dialog-title>{{ action }} Shop</h2>
<mat-dialog-content class="mat-typography">
    <form [formGroup]="shopForm">
        <div *ngIf="errorMessage" class="bg-light-error text-error p-8 m-b-16 rounded f-s-14">
            {{ errorMessage }}
        </div>
        <div class="row">
            <!-- Name -->
            <div class="col-lg-6">
                <mat-form-field appearance="outline" class="w-100" color="primary">
                    <mat-label>Shop Name</mat-label>
                    <input matInput formControlName="name" placeholder="Name" />
                    <mat-error *ngIf="shopForm.get('name')?.hasError('required')">Name is required</mat-error>
                </mat-form-field>
            </div>

            <!-- Floor -->
            <div class="col-lg-6">
                <mat-form-field appearance="outline" class="w-100" color="primary">
                    <mat-label>Floor</mat-label>
                    <input matInput type="number" formControlName="floor" placeholder="Floor number" />
                    <mat-error *ngIf="shopForm.get('floor')?.hasError('required')">Floor is required</mat-error>
                </mat-form-field>
            </div>

            <!-- Categories (Multi-select) -->
            <div class="col-lg-6">
                <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Categories</mat-label>
                    <mat-select formControlName="category" multiple>
                        <mat-option *ngFor="let cat of categories" [value]="cat">{{ cat }}</mat-option>
                    </mat-select>
                    <mat-error *ngIf="shopForm.get('category')?.hasError('required')">At least one category is
                        required</mat-error>
                </mat-form-field>
            </div>


            <!-- Status -->
            <div class="col-lg-6">
                <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Status</mat-label>
                    <mat-select formControlName="status">
                        <mat-option *ngFor="let status of statusList" [value]="status">{{ status }}</mat-option>
                    </mat-select>
                </mat-form-field>
            </div>

            <!-- Description -->
            <div class="col-lg-12">
                <mat-form-field appearance="outline" class="w-100" color="primary">
                    <mat-label>Description</mat-label>
                    <textarea matInput formControlName="description" rows="3" placeholder="Description"></textarea>
                </mat-form-field>
            </div>

            <!-- Opening Hours -->
            <div class="col-lg-12">
                <h3 class="mat-subtitle-1 f-w-600 m-b-16">Opening Hours</h3>
                <div formArrayName="opening_hours">
                    <div *ngFor="let hour of openingHours.controls; let i=index" [formGroupName]="i"
                        class="row align-items-center m-b-8">
                        <div class="col-sm-3">
                            <mat-checkbox formControlName="selected" color="primary">
                                <span class="f-w-600">{{ hour.get('day')?.value | titlecase }}</span>
                            </mat-checkbox>
                        </div>
                        <div class="col-sm-4" *ngIf="hour.get('selected')?.value">
                            <mat-form-field appearance="outline" class="w-100 density-compact">
                                <mat-label>Open</mat-label>
                                <input matInput type="time" formControlName="open">
                            </mat-form-field>
                        </div>
                        <div class="col-sm-4" *ngIf="hour.get('selected')?.value">
                            <mat-form-field appearance="outline" class="w-100 density-compact">
                                <mat-label>Close</mat-label>
                                <input matInput type="time" formControlName="close">
                            </mat-form-field>
                        </div>
                        <div class="col-sm-8" *ngIf="!hour.get('selected')?.value">
                            <span class="text-muted f-s-12">Closed</span>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
    <button mat-button (click)="closeDialog()">Cancel</button>
    <button mat-flat-button color="primary" [disabled]="!shopForm.valid" (click)="doAction()">{{ action }}</button>
</mat-dialog-actions>
