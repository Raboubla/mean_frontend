<mat-card class="cardWithShadow">
    <mat-card-content>
        <div class="row justify-content-between">
            <div class="col-lg-4">
                <mat-form-field appearance="outline" class="w-100 hide-hint">
                    <mat-label>Search Shops</mat-label>
                    <input matInput (keyup)="applyFilter($event)" placeholder="Filter by name">
                    <mat-icon matSuffix>search</mat-icon>
                </mat-form-field>
            </div>
            <div class="col-lg-4 d-flex justify-content-end align-items-center">
                <button mat-flat-button color="primary" (click)="openDialog('Add', {})">Add Shop</button>
            </div>
        </div>

        <div class="table-responsive">
            <table mat-table [dataSource]="dataSource" matSort class="w-100">

                <!-- Name Column -->
                <ng-container matColumnDef="name">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header class="f-w-600 mat-subtitle-1 f-s-14"> Name
                    </th>
                    <td mat-cell *matCellDef="let element" class="mat-body-1">
                        <div class="d-flex align-items-center">
                            <div class="m-l-16">
                                <h6 class="mat-subtitle-1 f-s-14 f-w-600">{{element.name}}</h6>
                                <span class="f-s-12 text-muted">{{element.description |
                                    slice:0:30}}{{element.description?.length > 30 ? '...' : ''}}</span>
                            </div>
                        </div>
                    </td>
                </ng-container>

                <!-- Category Column -->
                <ng-container matColumnDef="category">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header class="f-w-600 mat-subtitle-1 f-s-14">
                        Category </th>
                    <td mat-cell *matCellDef="let element" class="mat-body-1">
                        <div class="d-flex flex-wrap gap-4">
                            <span *ngFor="let cat of element.category"
                                class="bg-light-accent text-accent rounded f-w-600 p-6 p-y-4 f-s-12">{{cat}}</span>
                        </div>
                    </td>
                </ng-container>

                <!-- Status Column -->
                <ng-container matColumnDef="status">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header class="f-w-600 mat-subtitle-1 f-s-14"> Status
                    </th>
                    <td mat-cell *matCellDef="let element" class="mat-body-1">
                        <span [ngClass]="{
                    'bg-light-success text-success': element.status === 'OPEN',
                    'bg-light-error text-error': element.status === 'CLOSED',
                    'bg-light-warning text-warning': element.status === 'UNDER_RENOVATION' || element.status === 'COMING_SOON'
                }" class="rounded f-w-600 p-6 p-y-4 f-s-12">
                            {{element.status}}
                        </span>
                    </td>
                </ng-container>

                <!-- Floor Column -->
                <ng-container matColumnDef="floor">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header class="f-w-600 mat-subtitle-1 f-s-14"> Floor
                    </th>
                    <td mat-cell *matCellDef="let element" class="mat-body-1"> {{element.floor}} </td>
                </ng-container>

                <!-- Views Column -->
                <ng-container matColumnDef="views">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header class="f-w-600 mat-subtitle-1 f-s-14"> Views
                    </th>
                    <td mat-cell *matCellDef="let element" class="mat-body-1"> {{element.view_count}} </td>
                </ng-container>


                <!-- Actions Column -->
                <ng-container matColumnDef="actions">
                    <th mat-header-cell *matHeaderCellDef class="f-w-600 mat-subtitle-1 f-s-14"> Actions </th>
                    <td mat-cell *matCellDef="let element" class="mat-body-1">
                        <button mat-icon-button color="accent" (click)="openDialog('Update', element)"
                            matTooltip="Edit">
                            <mat-icon>edit</mat-icon>
                        </button>
                        <button mat-icon-button color="warn" (click)="deleteShop(element)" matTooltip="Delete">
                            <mat-icon>delete</mat-icon>
                        </button>
                        <button mat-icon-button (click)="toggleStatus(element)"
                            matTooltip="Toggle Status (Quick Open/Close)">
                            <mat-icon>swap_horiz</mat-icon>
                        </button>
                    </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            </table>

            <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons
                aria-label="Select page of shops"></mat-paginator>
        </div>
    </mat-card-content>
</mat-card>
