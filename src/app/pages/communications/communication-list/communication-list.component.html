<mat-card class="cardWithShadow">
    <mat-card-content>
        <div class="row justify-content-between">
            <div class="col-lg-4">
                <mat-form-field appearance="outline" class="w-100 hide-hint">
                    <mat-label>Search Communications</mat-label>
                    <input matInput (keyup)="applyFilter($event)" placeholder="Filter by title">
                    <mat-icon matSuffix>search</mat-icon>
                </mat-form-field>
            </div>
            <div class="col-lg-4 d-flex justify-content-end align-items-center">
                <button mat-flat-button color="primary" (click)="openDialog('Add', {})">New Communication</button>
            </div>
        </div>

        <div class="table-responsive">
            <table mat-table [dataSource]="dataSource" matSort class="w-100">

                <!-- Title Column -->
                <ng-container matColumnDef="title">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header class="f-w-600 mat-subtitle-1 f-s-14"> Title
                    </th>
                    <td mat-cell *matCellDef="let element" class="mat-body-1">
                        <div class="d-flex align-items-center">
                            <div class="m-l-16">
                                <h6 class="mat-subtitle-1 f-s-14 f-w-600">{{element.title}}</h6>
                            </div>
                        </div>
                    </td>
                </ng-container>

                <!-- Type Column -->
                <ng-container matColumnDef="type">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header class="f-w-600 mat-subtitle-1 f-s-14"> Type
                    </th>
                    <td mat-cell *matCellDef="let element" class="mat-body-1">
                        <span [ngClass]="{
                    'bg-light-primary text-primary': element.type === 'EVENT',
                    'bg-light-accent text-accent': element.type === 'ANNOUNCEMENT'
                }" class="rounded f-w-600 p-6 p-y-4 f-s-12">
                            {{element.type}}
                        </span>
                    </td>
                </ng-container>

                <!-- Target Column -->
                <ng-container matColumnDef="target">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header class="f-w-600 mat-subtitle-1 f-s-14"> Target
                    </th>
                    <td mat-cell *matCellDef="let element" class="mat-body-1">
                        <span class="bg-light-warning text-warning rounded f-w-600 p-6 p-y-4 f-s-12">
                            {{element.target}}
                        </span>
                    </td>
                </ng-container>

                <!-- Dates Column -->
                <ng-container matColumnDef="dates">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header class="f-w-600 mat-subtitle-1 f-s-14"> Valid
                        Dates </th>
                    <td mat-cell *matCellDef="let element" class="mat-body-1">
                        {{element.start_date | date:'shortDate'}} - {{element.end_date | date:'shortDate'}}
                    </td>
                </ng-container>

                <!-- Shop Column -->
                <ng-container matColumnDef="shop">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header class="f-w-600 mat-subtitle-1 f-s-14"> Shop
                    </th>
                    <td mat-cell *matCellDef="let element" class="mat-body-1">
                        {{element.shop ? (element.shop.name || element.shop) : 'Global'}}
                    </td>
                </ng-container>

                <!-- Actions Column -->
                <ng-container matColumnDef="actions">
                    <th mat-header-cell *matHeaderCellDef class="f-w-600 mat-subtitle-1 f-s-14"> Actions </th>
                    <td mat-cell *matCellDef="let element" class="mat-body-1">
                        <button mat-icon-button color="accent" (click)="openDialog('Update', element)"
                            matTooltip="Edit">
                            <mat-icon>edit</mat-icon>
                        </button>
                        <button mat-icon-button color="warn" (click)="deleteCommunication(element)" matTooltip="Delete">
                            <mat-icon>delete</mat-icon>
                        </button>
                    </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            </table>

            <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons
                aria-label="Select page of communications">
            </mat-paginator>
        </div>
    </mat-card-content>
</mat-card>
