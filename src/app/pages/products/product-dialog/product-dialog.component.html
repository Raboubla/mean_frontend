<h2 mat-dialog-title>{{ action }} Product</h2>
<mat-dialog-content class="mat-typography">
    <form [formGroup]="productForm">
        <div *ngIf="errorMessage" class="bg-light-error text-error p-8 m-b-16 rounded f-s-14">
            {{ errorMessage }}
        </div>
        <div class="row">
            <!-- Name -->
            <div class="col-lg-6">
                <mat-form-field appearance="outline" class="w-100" color="primary">
                    <mat-label>Product Name</mat-label>
                    <input matInput formControlName="name" placeholder="Name" />
                    <mat-error *ngIf="productForm.get('name')?.hasError('required')">Name is required</mat-error>
                </mat-form-field>
            </div>

            <!-- Price -->
            <div class="col-lg-6">
                <mat-form-field appearance="outline" class="w-100" color="primary">
                    <mat-label>Price</mat-label>
                    <input matInput type="number" formControlName="price" placeholder="Price" />
                    <mat-error *ngIf="productForm.get('price')?.hasError('required')">Price is required</mat-error>
                </mat-form-field>
            </div>

            <!-- Category -->
            <div class="col-lg-6">
                <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Category</mat-label>
                    <mat-select formControlName="category">
                        <mat-option *ngFor="let cat of categories" [value]="cat">{{ cat }}</mat-option>
                    </mat-select>
                    <mat-error *ngIf="productForm.get('category')?.hasError('required')">Category is
                        required</mat-error>
                </mat-form-field>
            </div>


            <!-- Status -->
            <div class="col-lg-6">
                <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Status</mat-label>
                    <mat-select formControlName="status">
                        <mat-option *ngFor="let status of statusList" [value]="status">{{ status }}</mat-option>
                    </mat-select>
                </mat-form-field>
            </div>

            <!-- Shop -->
            <div class="col-lg-6">
                <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Shop</mat-label>
                    <mat-select formControlName="shop">
                        <mat-option *ngFor="let shop of shops" [value]="shop._id">{{ shop.name }}</mat-option>
                    </mat-select>
                    <mat-error *ngIf="productForm.get('shop')?.hasError('required')">Shop is required</mat-error>
                </mat-form-field>
            </div>

            <!-- Is Active -->
            <div class="col-lg-6 d-flex align-items-center">
                <mat-checkbox formControlName="is_active" color="primary">Active</mat-checkbox>
            </div>


            <!-- Description -->
            <div class="col-lg-12">
                <mat-form-field appearance="outline" class="w-100" color="primary">
                    <mat-label>Description</mat-label>
                    <textarea matInput formControlName="description" rows="3" placeholder="Description"></textarea>
                </mat-form-field>
            </div>

            <!-- Promotion Section -->
            <div class="col-12 m-t-16 m-b-8">
                <h4 class="mat-subtitle-2 f-w-600">Promotion Details</h4>
            </div>

            <!-- Discount Percent -->
            <div class="col-lg-4">
                <mat-form-field appearance="outline" class="w-100" color="accent">
                    <mat-label>Discount (%)</mat-label>
                    <input matInput type="number" formControlName="promo_discount_percent" placeholder="e.g. 20" min="0"
                        max="100" />
                    <mat-error
                        *ngIf="productForm.get('promo_discount_percent')?.hasError('min') || productForm.get('promo_discount_percent')?.hasError('max')">
                        0 - 100%
                    </mat-error>
                </mat-form-field>
            </div>

            <!-- Promo Price -->
            <div class="col-lg-4">
                <mat-form-field appearance="outline" class="w-100" color="accent">
                    <mat-label>Promo Price</mat-label>
                    <input matInput type="number" formControlName="promo_price" placeholder="Automatic" />
                </mat-form-field>
            </div>

            <!-- Promotion End Date -->
            <div class="col-lg-4">
                <mat-form-field appearance="outline" class="w-100" color="accent">
                    <mat-label>End Date</mat-label>
                    <input matInput [matDatepicker]="picker" formControlName="promo_end_date">
                    <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
                    <mat-datepicker #picker></mat-datepicker>
                </mat-form-field>
            </div>
        </div>

    </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
    <button mat-button (click)="closeDialog()">Cancel</button>
    <button mat-flat-button color="primary" [disabled]="!productForm.valid" (click)="doAction()">{{ action }}</button>
</mat-dialog-actions>
