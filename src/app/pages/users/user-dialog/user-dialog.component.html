<h2 mat-dialog-title>{{ action }} User</h2>
<mat-dialog-content>
    <form [formGroup]="userForm">
        <div *ngIf="errorMessage" class="bg-light-error text-error p-8 m-b-16 rounded f-s-14">
            {{ errorMessage }}
        </div>
        <div class="row">
            <!-- Email -->
            <div class="col-lg-12">
                <mat-form-field appearance="outline" class="w-100" color="primary">
                    <mat-label>Email</mat-label>
                    <input matInput formControlName="email" type="email" placeholder="Email" />
                    <mat-error *ngIf="userForm.get('email')?.hasError('required')">Email is required</mat-error>
                    <mat-error *ngIf="userForm.get('email')?.hasError('email')">Invalid email</mat-error>
                </mat-form-field>
            </div>

            <!-- Password (Conditional) -->
            <div class="col-lg-12" *ngIf="action === 'Add' || userForm.get('password')?.value">
                <mat-form-field appearance="outline" class="w-100" color="primary">
                    <mat-label>Password</mat-label>
                    <input matInput formControlName="password" type="password" placeholder="Password" />
                    <mat-error *ngIf="userForm.get('password')?.hasError('required') && action === 'Add'">Password is
                        required</mat-error>
                </mat-form-field>
            </div>

            <!-- Role -->
            <div class="col-lg-6">
                <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Role</mat-label>
                    <mat-select formControlName="role">
                        <mat-option *ngFor="let role of roles" [value]="role">{{ role }}</mat-option>
                    </mat-select>
                </mat-form-field>
            </div>

            <!-- Status -->
            <div class="col-lg-6">
                <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Status</mat-label>
                    <mat-select formControlName="status">
                        <mat-option *ngFor="let status of statusList" [value]="status">{{ status }}</mat-option>
                    </mat-select>
                </mat-form-field>
            </div>

            <!-- Permissions (Multi-select) -->
            <div class="col-lg-12">
                <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Permissions</mat-label>
                    <mat-select formControlName="permission" multiple>
                        <mat-option *ngFor="let perm of permissionsList" [value]="perm">{{ perm }}</mat-option>
                    </mat-select>
                </mat-form-field>
            </div>

            <!-- Shop ID (Conditional) -->
            <!-- Logic: If role is SHOP_ADMIN or BUYER? usually SHOP_ADMIN needs a shop. -->
            <!-- Shop (Select) -->
            <div class="col-lg-12">
                <mat-form-field appearance="outline" class="w-100" color="primary">
                    <mat-label>Shop</mat-label>
                    <mat-select formControlName="shopId">
                        <mat-option [value]="''">None</mat-option>
                        <mat-option *ngFor="let shop of shops" [value]="shop._id">{{ shop.name }}</mat-option>
                    </mat-select>
                </mat-form-field>
            </div>

        </div>
    </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
    <button mat-button (click)="closeDialog()">Cancel</button>
    <button mat-flat-button color="primary" [disabled]="!userForm.valid" (click)="doAction()">{{ action }}</button>
</mat-dialog-actions>
