<h2 mat-dialog-title>{{ action }} Sale</h2>
<mat-dialog-content class="mat-typography">
    <form [formGroup]="saleForm">
        <div *ngIf="errorMessage" class="bg-light-error text-error p-8 m-b-16 rounded f-s-14">
            {{ errorMessage }}
        </div>
        <div class="row">
            <!-- Shop -->
            <div class="col-lg-6">
                <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Shop</mat-label>
                    <mat-select formControlName="shop">
                        <mat-option *ngFor="let shop of shops" [value]="shop._id">{{ shop.name }}</mat-option>
                    </mat-select>
                    <mat-error *ngIf="saleForm.get('shop')?.hasError('required')">Shop is required</mat-error>
                </mat-form-field>
            </div>

            <!-- Product -->
            <div class="col-lg-6">
                <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Product</mat-label>
                    <mat-select formControlName="product">
                        <mat-option *ngIf="products.length === 0" disabled>Select a shop first</mat-option>
                        <mat-option *ngFor="let prod of products" [value]="prod._id">{{ prod.name }}</mat-option>
                    </mat-select>
                    <mat-error *ngIf="saleForm.get('product')?.hasError('required')">Product is required</mat-error>
                </mat-form-field>
            </div>

            <!-- Quantity -->
            <div class="col-lg-4">
                <mat-form-field appearance="outline" class="w-100" color="primary">
                    <mat-label>Quantity</mat-label>
                    <input matInput type="number" formControlName="quantity" placeholder="Quantity" min="1" />
                    <mat-error *ngIf="saleForm.get('quantity')?.hasError('required')">Quantity is required</mat-error>
                </mat-form-field>
            </div>

            <!-- Unit Price -->
            <div class="col-lg-4">
                <mat-form-field appearance="outline" class="w-100" color="primary">
                    <mat-label>Unit Price</mat-label>
                    <input matInput type="number" formControlName="unit_price" placeholder="Unit Price" min="0" />
                    <mat-error *ngIf="saleForm.get('unit_price')?.hasError('required')">Price is required</mat-error>
                </mat-form-field>
            </div>

            <!-- Total Price -->
            <div class="col-lg-4">
                <mat-form-field appearance="outline" class="w-100" color="primary">
                    <mat-label>Total Price</mat-label>
                    <input matInput formControlName="total_price" placeholder="Total" readonly />
                </mat-form-field>
            </div>

        </div>
    </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
    <button mat-button (click)="closeDialog()">Cancel</button>
    <button mat-flat-button color="primary" [disabled]="!saleForm.valid" (click)="doAction()">{{ action }}</button>
</mat-dialog-actions>
