<div class="whatsapp-widget" [class.is-open]="isOpen">
    <!-- Tooltip -->
    <div class="whatsapp-tooltip" *ngIf="!isOpen" (click)="togglePopup($event)">
        <div class="whatsapp-tooltip-text" [ngClass]="{'show-tooltip': showTooltip}">
            <div>Want to create your own shop ?</div>
        </div>
    </div>

    <!-- Main Button -->
    <button class="whatsapp-btn" aria-label="Ouvrir WhatsApp" (click)="togglePopup($event)">
        <svg *ngIf="!isOpen" viewBox="0 0 24 24" fill="white" width="32" height="32">
            <path
                d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.38 2.27 1.019 3.287l-.582 2.128 2.182-.573c.978.58 1.911.928 3.145.929 3.178 0 5.767-2.587 5.768-5.766.001-3.187-2.575-5.77-5.764-5.771zm3.392 8.244c-.144.405-.837.774-1.17.824-.299.045-.677.063-1.092-.069-.252-.08-.575-.187-.988-.365-1.739-.751-2.874-2.549-2.961-2.665-.087-.116-.708-.94-.708-1.793s.448-1.273.607-1.446c.159-.173.346-.217.462-.217l.332.006c.106.005.249-.04.39.298.144.347.491 1.2.534 1.287.043.087.072.188.014.304-.058.116-.087.188-.173.289l-.26.304c-.087.086-.177.18-.076.354.101.174.449.741.964 1.201.662.591 1.221.774 1.394.86s.274.072.376-.043c.101-.116.433-.506.549-.68.116-.173.231-.145.39-.087s1.011.477 1.184.564.289.13.332.202c.045.072.045.419-.1.824zm-3.423-14.416c-6.627 0-12 5.373-12 12s5.373 12 12 12 12-5.373 12-12-5.373-12-12-12zm.082 21.603c-1.503 0-2.936-.381-4.221-1.054l-4.706 1.236 1.259-4.588c-.739-1.328-1.161-2.85-1.161-4.475 0-5.304 4.305-9.61 9.61-9.61s9.61 4.306 9.61 9.61-4.305 9.61-9.61 9.61z" />
        </svg>
        <mat-icon *ngIf="isOpen" style="color: white;">close</mat-icon>
    </button>

    <!-- Chat Box -->
    <div class="whatsapp-chat-box" (click)="$event.stopPropagation()">
        <div class="chat-header">
            <div class="chat-header-icon">
                <svg viewBox="0 0 24 24" fill="white" width="24" height="24">
                    <path
                        d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.38 2.27 1.019 3.287l-.582 2.128 2.182-.573c.978.58 1.911.928 3.145.929 3.178 0 5.767-2.587 5.768-5.766.001-3.187-2.575-5.77-5.764-5.771zm3.392 8.244c-.144.405-.837.774-1.17.824-.299.045-.677.063-1.092-.069-.252-.08-.575-.187-.988-.365-1.739-.751-2.874-2.549-2.961-2.665-.087-.116-.708-.94-.708-1.793s.448-1.273.607-1.446c.159-.173.346-.217.462-.217l.332.006c.106.005.249-.04.39.298.144.347.491 1.2.534 1.287.043.087.072.188.014.304-.058.116-.087.188-.173.289l-.26.304c-.087.086-.177.18-.076.354.101.174.449.741.964 1.201.662.591 1.221.774 1.394.86s.274.072.376-.043c.101-.116.433-.506.549-.68.116-.173.231-.145.39-.087s1.011.477 1.184.564.289.13.332.202c.045.072.045.419-.1.824zm-3.423-14.416c-6.627 0-12 5.373-12 12s5.373 12 12 12 12-5.373 12-12-5.373-12-12-12zm.082 21.603c-1.503 0-2.936-.381-4.221-1.054l-4.706 1.236 1.259-4.588c-.739-1.328-1.161-2.85-1.161-4.475 0-5.304 4.305-9.61 9.61-9.61s9.61 4.306 9.61 9.61-4.305 9.61-9.61 9.61z" />
                </svg>
            </div>
            <div class="chat-header-text">
                <div class="chat-title">Want to create your own shop?</div>
                <div class="chat-subtitle">Contact us to open your own shop on Stefan Mall!</div>
            </div>
            <button class="chat-close" aria-label="Fermer" (click)="togglePopup($event)">
                <mat-icon>close</mat-icon>
            </button>
        </div>
        <div class="chat-body">
            <div class="chat-contact" (click)="openWhatsApp($event)">
                <div class="contact-avatar">
                    <!-- Utilisation d'une image par défaut ou personnalisable pour le contact avatar -->
                    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Admin Default">
                    <div class="contact-status"></div>
                </div>
                <div class="contact-info">
                    <div class="contact-name">{{contactName}}</div>
                    <div class="contact-role">{{contactRole}}</div>
                </div>
                <div class="contact-icon">
                    <svg viewBox="0 0 24 24" fill="#25D366" width="24" height="24">
                        <path
                            d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.38 2.27 1.019 3.287l-.582 2.128 2.182-.573c.978.58 1.911.928 3.145.929 3.178 0 5.767-2.587 5.768-5.766.001-3.187-2.575-5.77-5.764-5.771zm3.392 8.244c-.144.405-.837.774-1.17.824-.299.045-.677.063-1.092-.069-.252-.08-.575-.187-.988-.365-1.739-.751-2.874-2.549-2.961-2.665-.087-.116-.708-.94-.708-1.793s.448-1.273.607-1.446c.159-.173.346-.217.462-.217l.332.006c.106.005.249-.04.39.298.144.347.491 1.2.534 1.287.043.087.072.188.014.304-.058.116-.087.188-.173.289l-.26.304c-.087.086-.177.18-.076.354.101.174.449.741.964 1.201.662.591 1.221.774 1.394.86s.274.072.376-.043c.101-.116.433-.506.549-.68.116-.173.231-.145.39-.087s1.011.477 1.184.564.289.13.332.202c.045.072.045.419-.1.824zm-3.423-14.416c-6.627 0-12 5.373-12 12s5.373 12 12 12 12-5.373 12-12-5.373-12-12-12zm.082 21.603c-1.503 0-2.936-.381-4.221-1.054l-4.706 1.236 1.259-4.588c-.739-1.328-1.161-2.85-1.161-4.475 0-5.304 4.305-9.61 9.61-9.61s9.61 4.306 9.61 9.61-4.305 9.61-9.61 9.61z" />
                    </svg>
                </div>
            </div>
        </div>
    </div>
</div>
